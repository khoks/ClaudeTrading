<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect width="880" height="240" fill="#0f172a" rx="14"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">Setup in 5 steps</text>

  <!-- Step 1 -->
  <g transform="translate(30, 78)">
    <circle cx="40" cy="36" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">1</text>
    <text x="40" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Clone</text>
    <text x="40" y="120" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, Consolas, monospace">git clone …</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path d="M 102 114 L 158 114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 2 -->
  <g transform="translate(160, 78)">
    <circle cx="40" cy="36" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">2</text>
    <text x="40" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Install</text>
    <text x="40" y="120" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, Consolas, monospace">jq · curl · gh</text>
  </g>

  <path d="M 232 114 L 288 114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 3 -->
  <g transform="translate(290, 78)">
    <circle cx="40" cy="36" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">3</text>
    <text x="40" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Add creds</text>
    <text x="40" y="120" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, Consolas, monospace">cp .env.example .env</text>
  </g>

  <path d="M 362 114 L 428 114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 4 -->
  <g transform="translate(430, 78)">
    <circle cx="40" cy="36" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">4</text>
    <text x="40" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Launch Claude</text>
    <text x="40" y="120" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, Consolas, monospace">claude</text>
  </g>

  <path d="M 502 114 L 558 114" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Step 5 -->
  <g transform="translate(560, 78)">
    <circle cx="40" cy="36" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="40" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">5</text>
    <text x="40" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Configure</text>
    <text x="40" y="120" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, Consolas, monospace">/master_configurator</text>
  </g>

  <path d="M 632 114 L 688 114" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>

  <!-- Final: Live -->
  <g transform="translate(692, 88)">
    <rect x="0" y="0" width="160" height="56" rx="28" fill="#22c55e"/>
    <text x="80" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">✅  LIVE</text>
    <text x="80" y="84" text-anchor="middle" font-size="11" fill="#cbd5e1">Schedule fires on next</text>
    <text x="80" y="100" text-anchor="middle" font-size="11" fill="#cbd5e1">market open</text>
  </g>

  <!-- Footer -->
  <text x="440" y="222" text-anchor="middle" font-size="11" fill="#64748b">/master_configurator bootstraps gitignored config from .example templates · registers cron · discloses permissions</text>
</svg>
