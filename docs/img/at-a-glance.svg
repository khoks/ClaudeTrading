<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect width="880" height="380" fill="#0f172a" rx="14"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">ClaudeTrading at a glance</text>
  <text x="440" y="62" text-anchor="middle" font-size="12" fill="#64748b">Autonomous Alpaca paper-trading driven by Claude Code skills</text>

  <!-- Block: YOU -->
  <g transform="translate(40, 92)">
    <rect width="200" height="244" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e" letter-spacing="2">YOU</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#334155" stroke-width="1"/>
    <text x="20" y="92" font-size="13" fill="#cbd5e1">📋  Curated tickers</text>
    <text x="20" y="138" font-size="13" fill="#cbd5e1">⚖️  Risk + $/trade cap</text>
    <text x="20" y="184" font-size="13" fill="#cbd5e1">🔑  Alpaca paper key</text>
    <text x="20" y="230" font-size="13" fill="#cbd5e1">🌐  Your local TZ</text>
  </g>

  <!-- Arrow YOU -> ENGINE -->
  <path d="M 248 214 L 304 214" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Block: ENGINE -->
  <g transform="translate(308, 92)">
    <rect width="264" height="244" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="132" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6" letter-spacing="2">ENGINE</text>
    <line x1="20" y1="50" x2="244" y2="50" stroke="#334155" stroke-width="1"/>
    <text x="132" y="86" text-anchor="middle" font-size="13" fill="#cbd5e1">⏰  Tick every N min</text>
    <text x="132" y="104" text-anchor="middle" font-size="11" fill="#94a3b8">(market hours, Mon–Fri)</text>
    <text x="132" y="142" text-anchor="middle" font-size="13" fill="#cbd5e1">🛡️  Cooldown filter</text>
    <text x="132" y="160" text-anchor="middle" font-size="11" fill="#94a3b8">(N-trading-day floor)</text>
    <text x="132" y="198" text-anchor="middle" font-size="13" fill="#cbd5e1">📐  4 strategies, 2 phases</text>
    <text x="132" y="216" text-anchor="middle" font-size="10" fill="#94a3b8">profit_take · trailing_stop</text>
    <text x="132" y="230" text-anchor="middle" font-size="10" fill="#94a3b8">mean_reversion · ladder_buys</text>
  </g>

  <!-- Arrow ENGINE -> OUTPUTS -->
  <path d="M 580 214 L 636 214" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Block: OUTPUTS -->
  <g transform="translate(640, 92)">
    <rect width="200" height="244" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
    <text x="100" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#a855f7" letter-spacing="2">OUTPUTS</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#334155" stroke-width="1"/>
    <text x="20" y="92" font-size="13" fill="#cbd5e1">💱  Paper trades</text>
    <text x="40" y="110" font-size="11" fill="#94a3b8">on Alpaca</text>
    <text x="20" y="148" font-size="13" fill="#cbd5e1">📰  Daily HTML report</text>
    <text x="40" y="166" font-size="11" fill="#94a3b8">at 7 AM local</text>
    <text x="20" y="204" font-size="13" fill="#cbd5e1">💾  Per-tick snapshots</text>
    <text x="40" y="222" font-size="11" fill="#94a3b8">(local-only · gitignored)</text>
  </g>

  <!-- Footer -->
  <text x="440" y="362" text-anchor="middle" font-size="11" fill="#64748b">Paper trading only · No live-money path · Trading state stays on your machine</text>
</svg>
